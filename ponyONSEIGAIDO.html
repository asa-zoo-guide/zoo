<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="GENERATOR" content="JustSystems Homepage Builder Version 22.0.5.0 for Windows">
<meta name="justsystems:DeviceType" content="SmartPhoneV">
<title>ポニーの解説 - 安佐動物公園ガイド</title>
<style>
</style>
</head>
<body>

<div class="text-section">
  <h1>ポニー</h1>

  <img src="animal_pony.png" width="300" height="300" border="0"><br>

  <div style="padding: 0 5px; margin-bottom: 25px;">
    <button type="button" id="main-btn" onclick="playText('pony-speech')" 
            style="display: block; width: 100%; height: 140px; font-size: 32px; font-weight: bold; border: none; border-radius: 20px; background-color: #4CAF50; color: white; cursor: pointer; box-shadow: 0 8px 0 #388E3C; -webkit-tap-highlight-color: transparent;">
      <span aria-hidden="true">🔊 </span>お話をきく
    </button>
  </div>

  <div id="pony-speech" class="explanation-text">
    みなさん、目の前にいるポニーをじっくり見てみてください。よくウマの赤ちゃんに間違えられますが、実はこれで、もう立派なおとなのウマんです。<br><br>
    ウマのなかまで、おとなになっても背中の高さが1メートル50センチより小さいウマたちのことを、まとめて「ポニー」と呼びます。<br><br>
    ポニーはとっても頭がよくて、優しくて、力持ちな性格をしています。大昔から人間の代わりに重い荷物を運んだり、畑をたがやすお手伝いをしたりして、人と一緒に仲良く暮らしてきました。<br><br>
    体が小さくても、とってもタフで元気いっぱいです。ポニーの優しい目を見つめてみてくださいね。
  </div>
</div>

<div class="back-footer">
  <a href="index.html" class="back-link">← 音声ガイド（動物一覧）にもどる</a>
</div>

<script>
function playText(id) {
  if (window.speechSynthesis) {
    var btn = document.getElementById('main-btn');
    
    // もし喋っていたら止める
    if (window.speechSynthesis.speaking) {
      window.speechSynthesis.cancel();
      resetButton(btn);
      return;
    }
    
    var target = document.getElementById(id);
    if (target) {
      var text = target.textContent || target.innerText;
      var uttr = new SpeechSynthesisUtterance(text);
      uttr.lang = "ja-JP";
      uttr.rate = 1.0;
      uttr.pitch = 1.0;
      
      // 再生が始まったら赤色にする（ここにも直接特大サイズを上書きします）
      uttr.onstart = function() {
        btn.innerHTML = '<span aria-hidden="true">🛑 </span>お話を止める';
        btn.style.backgroundColor = '#d32f2f';
        btn.style.boxShadow = '0 8px 0 #9a0007';
      };
      
      // 終わったら元の緑色に戻す
      uttr.onend = function() {
        resetButton(btn);
      };
      
      window.speechSynthesis.speak(uttr);
    }
  }
}

function resetButton(btn) {
  if (btn) {
    btn.innerHTML = '<span aria-hidden="true">🔊 </span>お話をきく';
    btn.style.backgroundColor = '#4CAF50';
    btn.style.boxShadow = '0 8px 0 #388E3C';
  }
}
</script>

</body>
</html>
