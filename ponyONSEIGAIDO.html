<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="GENERATOR" content="JustSystems Homepage Builder Version 22.0.5.0 for Windows">
<meta name="justsystems:DeviceType" content="SmartPhoneV">
<title>ポニーの解説 - 安佐動物公園ガイド</title>
</head>
<body style="margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: #f9f9f9; text-align: center; line-height: 1.8;">

<div style="padding: 20px;">
  <h1 style="font-size: 24px; color: #2d5a27; margin: 10px 0 20px;">ポニー</h1>

  <img src="animal_pony.png" width="300" border="0" style="margin-bottom: 20px; max-width: 100%; height: auto;" height="300"><br>
  <div style="padding: 0 5px; margin-bottom: 25px;">
    <button type="button" id="main-btn" onclick="playText('pony-speech')" 
            style="display: block; width: 100%; height: 50px; font-size: 24px; font-weight: bold; border: none; border-radius: 16px; background-color: #4CAF50; color: white; cursor: pointer; box-shadow: 0 6px 0 #388E3C; -webkit-tap-highlight-color: transparent;">
      🔊 お話をきく
    </button>
    ↑<br>
    下の文章を読み上げます
  </div>
  <div id="pony-speech" style="font-size: 16px; color: #333333; text-align: left; background: #ffffff; padding: 20px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); margin-bottom: 20px;">
    みなさん、目の前にいるポニーをじっくり見てみてください。よくウマの赤ちゃんに間違えられますが、実はこれで、もう立派なおとなのウマなんです。<br><br>
    ウマのなかまで、おとなになっても背中の高さが1メートル50センチより小さいウマたちのことを、まとめて「ポニー」と呼びます。<br><br>
    ポニーはとっても頭がよくて、優しくて、力持ちです。大昔から人間の代わりに重い荷物を運んだり、畑をたがやすお手伝いをして、人と一緒に仲良く暮らしてきました。<br><br>
    体が小さくても、とってもタフで元気いっぱいです。ポニーの優しい目を見つめてみてくださいね。
  </div>
</div>
<BR>
<div style="text-align: center; padding: 10px 0 40px;">
  <a href="ONSEIGAIDO.html" style="color: #888; text-decoration: none; font-size: 14px;">← 音声ガイド（動物一覧）にもどる</a>
</div>

<script>
function playText(id) {
  if (!window.speechSynthesis) {
    alert("お使いのブラウザは音声読み上げに対応していません。");
    return;
  }

  var btn = document.getElementById('main-btn');
  
  // 1. もし現在再生中なら、即座に止めてボタンを元に戻して終了
  if (window.speechSynthesis.speaking) {
    window.speechSynthesis.cancel();
    resetButton(btn);
    return;
  }
  
  var target = document.getElementById(id);
  if (target) {
    var text = target.textContent || target.innerText;
    var cleanedText = text.replace(/🔊|🛑/g, ''); 
    
    var uttr = new SpeechSynthesisUtterance(cleanedText);
    uttr.lang = "ja-JP";
    uttr.rate = 1.0;
    uttr.pitch = 1.0;
    
    // 2. 【重要】スマホのブロックを回避するため、speakを呼ぶ前にボタン表示を即時変える
    btn.innerHTML = '🛑 お話を止める';
    btn.style.backgroundColor = '#d32f2f';
    btn.style.boxShadow = '0 6px 0 #9a0007';
    
    // 3. 喋り終わったときの処理だけを仕込んでおく
    uttr.onend = function() {
      resetButton(btn);
    };
    uttr.onerror = function() {
      resetButton(btn);
    };
    
    // 4. 発声を開始
    window.speechSynthesis.speak(uttr);
  }
}

// ボタンを最初の緑色に戻す処理
function resetButton(btn) {
  if (btn) {
    btn.innerHTML = '🔊 お話をきく';
    btn.style.backgroundColor = '#4CAF50';
    btn.style.boxShadow = '0 6px 0 #388E3C';
  }
}
</script>
</body>
</html>
